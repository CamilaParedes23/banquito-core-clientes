server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:core-customer-service}
  datasource:
    url: ${CUSTOMER_DB_URL:jdbc:mysql://mysql-customer:3306/banquito_core_customer_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Guayaquil}
    username: ${CUSTOMER_DB_USER:root}
    password: ${CUSTOMER_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
        jdbc:
          time_zone: ${APP_TIME_ZONE:America/Guayaquil}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${FLYWAY_BASELINE_VERSION:1}
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_EXPOSURE:health,info}
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_SHOW_DETAILS:always}

springdoc:
  api-docs:
    path: ${OPENAPI_DOCS_PATH:/api-docs}
  swagger-ui:
    path: ${SWAGGER_UI_PATH:/swagger-ui.html}

banquito:
  security:
    jwt:
      issuer: ${JWT_ISSUER}
      secret: ${JWT_SECRET}
  demo:
    enabled: ${DEMO_DATA_ENABLED:false}
  grpc:
    server:
      port: ${GRPC_SERVER_PORT:9092}
